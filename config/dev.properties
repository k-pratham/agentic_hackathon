# =============================================================================
# Development Environment Configuration
# =============================================================================

# -----------------------------------------------------------------------------
# Oracle Database - Application Schema
# -----------------------------------------------------------------------------
app.oracle.host=localhost
app.oracle.port=1521
app.oracle.service_name=XEPDB1
app.oracle.user=ingestion_user
app.oracle.pool.min=1
app.oracle.pool.max=3

# -----------------------------------------------------------------------------
# Oracle Database - DBIE Schema
# -----------------------------------------------------------------------------
dbie.oracle.host=localhost
dbie.oracle.port=1521
dbie.oracle.service_name=XEPDB1
dbie.oracle.user=dbie_user
dbie.oracle.pool.min=1
dbie.oracle.pool.max=3

# -----------------------------------------------------------------------------
# Elasticsearch
# -----------------------------------------------------------------------------
es.host=http://localhost
es.port=9200
es.index=regulatory_documents_index
es.user=elastic
es.use_ssl=false

# -----------------------------------------------------------------------------
# Aphrodite LLM — NuMarkdown (Image-to-Markdown)
# -----------------------------------------------------------------------------
aphrodite.base_url=http://localhost:2242/v1
aphrodite.numarkdown.model=numind/NuMarkdown-8B-Thinking
aphrodite.numarkdown.max_tokens=4096
aphrodite.numarkdown.temperature=0.1

# -----------------------------------------------------------------------------
# Aphrodite LLM — Metadata Extraction
# -----------------------------------------------------------------------------
aphrodite.metadata.model=numind/NuMarkdown-8B-Thinking
aphrodite.metadata.max_tokens=1024
aphrodite.metadata.temperature=0.0

# -----------------------------------------------------------------------------
# Aphrodite LLM — Agentic Backend (Reasoning)
# -----------------------------------------------------------------------------
aphrodite.reasoning.model=nemotron-30b
aphrodite.reasoning.max_tokens=4096
aphrodite.reasoning.temperature=0.1

# -----------------------------------------------------------------------------
# Aphrodite LLM — Agentic Backend (SQL Coder)
# -----------------------------------------------------------------------------
aphrodite.sql_coder.model=qwen-coder
aphrodite.sql_coder.max_tokens=2048
aphrodite.sql_coder.temperature=0.0

# -----------------------------------------------------------------------------
# Embedding Configuration
# Provider: onnx (local) | api (remote)
# -----------------------------------------------------------------------------
embedding.provider=onnx
embedding.model_id=nomic-ai/nomic-embed-text-v1.5
embedding.dimension=384
embedding.max_length=8192
embedding.api_url=
embedding.api_model=

# -----------------------------------------------------------------------------
# Pipeline Settings
# -----------------------------------------------------------------------------
pipeline.max_workers=2
pipeline.http_timeout=180
pipeline.http_connect_timeout=10
pipeline.dpi_scale=2.0

# -----------------------------------------------------------------------------
# KRI Excel Column Mapping
# Maps Excel column headers to kri_data table columns
# -----------------------------------------------------------------------------
kri.column.indicator_code=Indicator Code
kri.column.indicator_name=Indicator Name
kri.column.actual_value=Actual Value
kri.column.threshold_limit=Threshold Limit
kri.column.report_date=Report Date

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging.dir=logs
logging.level=INFO
logging.max_bytes=10485760
logging.backup_count=5

# -----------------------------------------------------------------------------
# Admin API Server
# -----------------------------------------------------------------------------
api.host=0.0.0.0
api.port=8000

# -----------------------------------------------------------------------------
# Agentic Backend configuration
# -----------------------------------------------------------------------------
agent.index.schema=oracle_schema_index
agent.scope.policy=Allowed topics: Banking, Inspections, KRIs, Action Points, Regulatory Compliance, Cyber Security in Banks. Disallowed: Writing code, general web search, weather, non-banking topics.
