<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
  <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8 space-y-6">
    <div class="text-center">
      <h2 class="text-3xl font-bold text-gray-900 tracking-tight">Welcome to SAMVAD</h2>
      <p class="mt-2 text-sm text-gray-500">Sign in to access your department's data</p>
    </div>
    
    <form class="space-y-4" (ngSubmit)="onSubmit()">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
        <div class="mt-1">
          <input id="email" name="email" type="email" autocomplete="email" required
                 [(ngModel)]="email"
                 class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
        </div>
      </div>

      <div *ngIf="error" class="text-red-600 text-sm mt-2">
        {{ error }}
      </div>

      <div>
        <button type="submit" [disabled]="loading || !email"
                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50">
          <span *ngIf="loading">Signing in...</span>
          <span *ngIf="!loading">Sign in</span>
        </button>
      </div>
    </form>
  </div>
</div>
