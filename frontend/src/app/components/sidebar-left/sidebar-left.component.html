<div class="h-full flex flex-col bg-gray-50 border-r border-gray-200">
  <!-- Logo Area -->
  <div class="h-16 flex items-center px-6 border-b border-gray-200">
    <div class="flex items-center">
      <img src="/logo.png" alt="SAMVAD Logo" class="h-10 object-contain">
    </div>
  </div>

  <!-- Navigation -->
  <div class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
    <a href="#" class="flex items-center px-3 py-2.5 bg-gray-200 text-gray-900 rounded-lg font-medium transition-colors">
      <svg class="w-5 h-5 mr-3 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
      Chat
    </a>
    <a href="#" class="flex items-center px-3 py-2.5 text-gray-600 hover:bg-gray-100 hover:text-gray-900 rounded-lg font-medium transition-colors">
      <svg class="w-5 h-5 mr-3 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      History
    </a>
  </div>

  <!-- User Profile & Logout -->
  <div class="p-4 border-t border-gray-200">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3 overflow-hidden">
        <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center flex-shrink-0">
          <span class="text-indigo-700 font-semibold text-sm">{{ authService.user()?.person_name?.charAt(0) || 'U' }}</span>
        </div>
        <div class="truncate">
          <p class="text-sm font-medium text-gray-900 truncate">{{ authService.user()?.person_name }}</p>
          <p class="text-xs text-gray-500 truncate">Dept ID: {{ authService.user()?.dept_id }}</p>
        </div>
      </div>
      <button (click)="logout()" class="p-1.5 text-gray-400 hover:text-red-600 rounded-lg hover:bg-gray-100 transition-colors" title="Logout">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
      </button>
    </div>
  </div>
</div>
